<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111415" />
      <stop offset="100%" stop-color="#181c1e" />
    </linearGradient>
    <!-- Lens Ring & Accent Gradient -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a0caff" />
      <stop offset="50%" stop-color="#2294f4" />
      <stop offset="100%" stop-color="#003259" />
    </linearGradient>
    <!-- Document Glow -->
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02" />
    </linearGradient>
    <!-- Drop Shadow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Rounded Canvas -->
  <rect width="200" height="200" rx="40" fill="url(#bgGrad)" />

  <!-- Abstract Document (Resume) Base -->
  <rect x="55" y="45" width="75" height="100" rx="8" fill="url(#docGrad)" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.5" />
  
  <!-- Document Lines representing content -->
  <line x1="70" y1="65" x2="115" y2="65" stroke="#ffffff" stroke-opacity="0.4" stroke-width="3" stroke-linecap="round" />
  <line x1="70" y1="80" x2="105" y2="80" stroke="#ffffff" stroke-opacity="0.4" stroke-width="3" stroke-linecap="round" />
  <line x1="70" y1="95" x2="95" y2="95" stroke="#ffffff" stroke-opacity="0.4" stroke-width="3" stroke-linecap="round" />
  <line x1="70" y1="110" x2="110" y2="110" stroke="#ffffff" stroke-opacity="0.4" stroke-width="3" stroke-linecap="round" />

  <!-- The "Lens" Overlay (Circular scanning frame) -->
  <circle cx="120" cy="115" r="42" fill="none" stroke="url(#primaryGrad)" stroke-width="6" filter="url(#glow)" />
  
  <!-- Scanner crosshair/lens aperture elements -->
  <circle cx="120" cy="115" r="22" fill="none" stroke="#a0caff" stroke-width="1.5" stroke-dasharray="6 4" />
  <circle cx="120" cy="115" r="8" fill="#a0caff" opacity="0.8" />
  
  <!-- Optical Reflection Accent -->
  <path d="M 98 93 A 30 30 0 0 1 142 93" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.6" />
</svg>
