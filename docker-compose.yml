version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: resumelens-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: resumelens

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

